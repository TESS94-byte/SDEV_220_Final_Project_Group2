{% load static %}

<!DOCTYPE html>
<html>

<head>
    <title>Our Services - The Cleaning Crew</title>
    <link rel="stylesheet" href="{% static 'services/style.css' %}">
</head>

<body>

<nav>
    <a href="/">Home</a>
    <a href="/services/">Services</a>
    <a href="/admin/">Admin</a>
</nav>


<header>
    <h1>Our Cleaning Services</h1>
    <p>Choose the service that fits your needs</p>
</header>


<div class="container">

    {% for service in services %}

    <div class="card">

        <h2>
            <a href="/services/{{ service.id }}/">
                {{ service.name }}
            </a>
        </h2>

        <p>{{ service.description }}</p>

        <p>
            Price: ${{ service.price }}
        </p>

    </div>

    {% endfor %}

</div>


<footer>
    <p>© 2026 The Cleaning Crew</p>
</footer>


</body>

</html>
