{% load static %}

<!DOCTYPE html>
<html>

<head>
    <title>{{ service.name }} - The Cleaning Crew</title>
    <link rel="stylesheet" href="{% static 'services/style.css' %}">
</head>


<body>

<nav>
    <a href="/">Home</a>
    <a href="/services/">Services</a>
    <a href="/admin/">Admin</a>
</nav>


<header>
    <h1>{{ service.name }}</h1>
    <p>Professional cleaning service</p>
</header>


<div class="container">

    <div class="card">

        <h2>{{ service.name }}</h2>

        <p>
            {{ service.description }}
        </p>

        <p>
            <strong>Price:</strong> ${{ service.price }}
        </p>


        <br>

        <a class="button" href="/services/">
            Back to Services
        </a>

    </div>

</div>


<footer>
    <p>© 2026 The Cleaning Crew</p>
</footer>


</body>

</html>
